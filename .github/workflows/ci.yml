name: CI

# Gate every PR/push with fail-fast quality + security checks, then build/scan/push.
on:
  push:
    branches: [main]
  pull_request:

# Don't waste runners on superseded commits — cancel older runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    # Fast preflight: lint + lockfile-drift (so the pinned venv is reproducible).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Lockfile in sync with pyproject
        run: uv lock --locked
      - name: Lint
        run: uvx ruff check .

  security:
    # Secret scan (BYOK-critical) + SCA (dependency CVEs) + SAST (Python code).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # gitleaks scans full history
      - name: Secret scan (gitleaks)
        # Docker image = no GITLEAKS_LICENSE needed (the action requires one for orgs).
        run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect --source=/repo --config=/repo/.gitleaks.toml --redact
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Dependency CVE audit (pip-audit)
        working-directory: backend
        run: |
          uv export --no-emit-project --format requirements-txt -o reqs.txt
          uvx pip-audit -r reqs.txt --progress-spinner off
      - name: Python SAST (bandit)
        working-directory: backend
        run: uvx bandit -r app -ll

  test:
    runs-on: ubuntu-latest
    # Real service containers so the redis-gated tests (leader lock, pub/sub SSE,
    # arq queue e2e, WhatsApp dedup) run for real instead of skipping.
    services:
      redis:
        image: redis/redis-stack-server:latest
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: agent
          POSTGRES_DB: agent
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U agent" --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379/0
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv sync --frozen
      - name: Test
        # Deselect the live Tavily test (needs an external paid key/quota).
        run: uv run python -m pytest -q --deselect tests/integration/test_live.py::test_live_tavily_search

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint chart
        run: helm lint deploy/helm/orchestrator

  build:
    needs: [static, security, test, helm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/backend" >> "$GITHUB_OUTPUT"
      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          tags: ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Image CVE scan (Trivy)
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ${{ steps.img.outputs.name }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"          # fail the build on HIGH/CRITICAL
          ignore-unfixed: true    # don't block on CVEs with no upstream fix yet
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push (main only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha

services:
  postgres:
    image: postgres:16-alpine
    container_name: ca-postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    container_name: ca-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ca-backend
    # Full bind mount + anonymous .venv: fresh deps on `down && up`, fast restart in between.
    command: ["sh", "-c", "uv sync && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://agent:agent@postgres:5432/agent
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  mcp-sample:
    build:
      context: ./backend
    container_name: ca-mcp-sample
    command: ["sh", "-c", "uv sync && uv run python -m app.integrations.sample_mcp_server"]
    volumes:
      - ./backend:/app
      - /app/.venv
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: ca-frontend
    working_dir: /app
    # Full bind mount + anonymous node_modules: fresh deps on `down && up`, fast restart in between.
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 80"]
    environment:
      VITE_API_URL: /api
      API_BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:

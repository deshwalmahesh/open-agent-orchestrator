{{- if .Values.api.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "orchestrator.fullname" . }}-api
  labels:
    {{- include "orchestrator.labels" . | nindent 4 }}
  {{- with .Values.api.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.api.ingress.className }}
  ingressClassName: {{ .Values.api.ingress.className }}
  {{- end }}
  {{- if .Values.api.ingress.tls }}
  tls:
    - hosts: [{{ .Values.api.ingress.host | quote }}]
      secretName: {{ .Values.api.ingress.tlsSecretName | default (printf "%s-tls" (include "orchestrator.fullname" .)) }}
  {{- end }}
  rules:
    - host: {{ .Values.api.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "orchestrator.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
{{- end }}

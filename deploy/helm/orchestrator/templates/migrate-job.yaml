{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "orchestrator.fullname" . }}-migrate
  labels:
    {{- include "orchestrator.labels" . | nindent 4 }}
  annotations:
    # Run ONCE before each install/upgrade, before api/worker roll. Single pod →
    # no concurrent create_all/seed race. Delete the old Job so the new one runs.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "orchestrator.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uv", "run", "python", "-m", "app.migrate"]
          envFrom:
            {{- include "orchestrator.envFrom" . | nindent 12 }}
{{- end }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "orchestrator.fullname" . }}-config
  labels:
    {{- include "orchestrator.labels" . | nindent 4 }}
  annotations:
    # Also a hook (weight below the migrate Job) so the pre-install migrate Job can
    # read it — hooks run before normal resources. before-hook-creation (no
    # hook-succeeded) keeps it alive for the regular api/worker pods too.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  {{- range $k, $v := .Values.config }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}

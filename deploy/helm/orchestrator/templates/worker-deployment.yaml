apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orchestrator.fullname" . }}-worker
  labels:
    {{- include "orchestrator.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  {{- if not .Values.worker.keda.enabled }}
  replicas: {{ .Values.worker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      annotations:
        # Worker is not an HTTP server; app.metrics.start_worker_metrics_server exposes
        # the Prometheus registry on this port so runs_total is scrapable on worker pods.
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.worker.metricsPort }}"
        prometheus.io/path: "/metrics"
      labels:
        {{- include "orchestrator.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # arq drains in-flight jobs on SIGTERM; give it room before SIGKILL.
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uv", "run", "arq", "app.worker.WorkerSettings"]
          ports:
            - name: metrics
              containerPort: {{ .Values.worker.metricsPort }}
          env:
            - name: WORKER_METRICS_PORT
              value: "{{ .Values.worker.metricsPort }}"
          envFrom:
            {{- include "orchestrator.envFrom" . | nindent 12 }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
